apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-weave.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fusion-weave.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fusion-weave.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: manager
          image: {{ include "fusion-weave.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/manager"]
          args:
            - --metrics-bind-address=:{{ .Values.ports.metrics }}
            - --health-probe-bind-address=:{{ .Values.ports.health }}
            - --webhook-bind-address=:{{ .Values.ports.webhook }}
            - --namespace={{ .Values.namespace }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            - name: health
              containerPort: {{ .Values.ports.health }}
            - name: webhook
              containerPort: {{ .Values.ports.webhook }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
