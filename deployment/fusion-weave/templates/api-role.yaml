{{- if .Values.api.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.api.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-weave.labels" . | nindent 4 }}
rules:
  - apiGroups: ["weave.fusion-platform.io"]
    resources:
      - weavejobtemplates
      - weavejobtemplates/status
      - weaveservicetemplates
      - weaveservicetemplates/status
      - weavechains
      - weavechains/status
      - weavetriggers
      - weavetriggers/status
      - weaveruns
      - weaveruns/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if .Values.api.auth.apiKeyEnabled }}
  # Secrets listed to resolve API key credentials (label: fusion-platform.io/api-key=true).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
  {{- end }}
  # Monitoring API — read batch Jobs, Deployments, Events, and pod logs.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
{{- end }}
