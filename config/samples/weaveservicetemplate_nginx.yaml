# Sample WeaveServiceTemplate: a simple nginx-based HTTP server.
# The chain below builds an artifact, then deploys it with rolling update.
#
# Usage:
#   kubectl apply -f weaveservicetemplate_nginx.yaml -n fusion
#   kubectl apply -f weavechain_deploy_demo.yaml -n fusion
---
apiVersion: weave.fusion-platform.io/v1alpha1
kind: WeaveServiceTemplate
metadata:
  name: nginx-server
  namespace: fusion
spec:
  image: nginx:alpine
  replicas: 2
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
  serviceType: ClusterIP
  unhealthyDuration: "5m"
  revisionHistoryLimit: 3
