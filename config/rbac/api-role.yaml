apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fusion-weave-api
  namespace: fusion
rules:
  - apiGroups: ["weave.fusion-platform.io"]
    resources:
      - weavejobtemplates
      - weavejobtemplates/status
      - weaveservicetemplates
      - weaveservicetemplates/status
      - weavechains
      - weavechains/status
      - weavetriggers
      - weavetriggers/status
      - weaveruns
      - weaveruns/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets are listed to resolve API key credentials (label selector: fusion-platform.io/api-key=true).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
